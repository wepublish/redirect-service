services:
  redirect-service:
    # Pull the published image instead of building locally.
    image: ghcr.io/wepublish/redirect-service:latest
    pull_policy: always
    # tini as PID1: forwards signals and reaps the two child processes.
    init: true
    restart: unless-stopped
    # Host 80/443 -> container's unprivileged 8080/4443. The Docker daemon
    # (already root) binds the privileged host ports; the container stays non-root.
    ports:
      - "80:8080"
      - "443:4443"
    env_file:
      - .env
    volumes:
      # Bind-mount a host folder for persistence. Holds both:
      #   ./data/redirects.db   (SQLite rules)
      #   ./data/caddy/...      (Let's Encrypt certs + Caddy state)
      # The container runs as UID 1001 / GID 0, so this folder must be writable
      # by that user. Before first start:  mkdir -p data && sudo chown -R 1001:0 data
      - ./data:/data
